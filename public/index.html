<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>LiveControl</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Connection overlay -->
  <div id="connection-overlay" class="connection-overlay">
    <div class="connection-card">
      <div class="connection-spinner"></div>
      <p class="connection-title">Connecting to Ableton</p>
      <p class="connection-sub">Make sure AbletonJS script is active</p>
    </div>
  </div>

  <!-- Confirm jump modal -->
  <div id="jump-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-card">
      <p class="modal-title">Jump to song?</p>
      <p class="modal-song-name" id="modal-song-name"></p>
      <div class="modal-actions">
        <button class="btn-secondary" id="modal-cancel">Cancel</button>
        <button class="btn-primary" id="modal-confirm">Jump</button>
      </div>
    </div>
  </div>

  <!-- Notes editor modal -->
  <div id="notes-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-card notes-card">
      <p class="modal-title">Song Notes</p>
      <p class="modal-song-name" id="notes-modal-name"></p>
      <textarea id="notes-textarea" placeholder="Add notes, chords, setlist instructions..."></textarea>
      <div class="modal-actions">
        <button class="btn-secondary" id="notes-cancel">Cancel</button>
        <button class="btn-primary" id="notes-save">Save</button>
      </div>
    </div>
  </div>

  <!-- Color picker modal -->
  <div id="color-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-card color-card">
      <p class="modal-title">Song Color</p>
      <div class="color-swatches" id="color-swatches"></div>
      <div class="modal-actions">
        <button class="btn-secondary" id="color-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Plugin settings modal -->
  <div id="plugin-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-card plugin-card">
      <p class="modal-title">Plugin Settings</p>
      <p class="modal-song-name" id="plugin-modal-track-name"></p>
      <div id="plugin-devices" class="plugin-devices"></div>
      <div class="modal-actions">
        <button class="btn-primary" id="plugin-close">Done</button>
      </div>
    </div>
  </div>

  <!-- Countdown overlay -->
  <div id="countdown-overlay" class="countdown-overlay hidden">
    <div id="countdown-number" class="countdown-number">1</div>
  </div>

  <!-- Toast notifications -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <!-- Main app -->
  <div id="app" class="app hidden">

    <header class="header">
      <div class="header-left">
        <div class="logo">LC</div>
        <div class="project-name" id="project-name">LiveControl</div>
      </div>
      <div class="header-right">
        <div class="conn-dot" id="conn-dot"></div>
      </div>
    </header>

    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>

    <!-- Setlist -->
    <main class="setlist-container">
      <div class="setlist-header">
        <span class="setlist-title">SETLIST</span>
        <span class="setlist-duration" id="setlist-duration"></span>
      </div>
      <div id="setlist" class="setlist"></div>
    </main>

    <!-- Tab bar -->
    <nav class="tab-bar">
      <button class="tab-btn tab-btn--active" data-tab="setlist">
        <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
        <span>Setlist</span>
      </button>
      <button class="tab-btn" data-tab="tracks">
        <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        <span>Tracks</span>
      </button>
      <button class="tab-btn" data-tab="mixer">
        <svg viewBox="0 0 24 24"><path d="M3 17v2h6v-2H3zM3 5v2h10V5H3zm10 16v-2h8v-2h-8v-2h-2v6h2zM7 9v2H3v2h4v2h2V9H7zm14 4v-2H11v2h10zm-6-4h2V7h4V5h-4V3h-2v6z"/></svg>
        <span>Mixer</span>
      </button>
    </nav>

    <!-- Tracks panel -->
    <div id="tracks-panel" class="tracks-panel hidden">
      <div id="tracks-list" class="tracks-list">
        <div class="loading-tracks">Loading tracks...</div>
      </div>
    </div>

    <!-- Mixer panel -->
    <div id="mixer-panel" class="mixer-panel hidden">
      <div class="mixer-toolbar">
        <span class="mixer-label">SOUND ENGINEER MIXER</span>
        <button class="mixer-refresh-btn" id="mixer-refresh">
          <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
          Refresh
        </button>
      </div>
      <div id="mixer-channels" class="mixer-channels">
        <div class="loading-tracks">Loading mixer…</div>
      </div>
    </div>

    <!-- Bottom transport bar -->
    <div class="bottom-bar">
      <div class="bottom-bar-info">
        <div class="bottom-timecode" id="transport-time">0:00</div>
        <div class="bottom-song-name" id="transport-song-name">—</div>
        <div class="bottom-bpm"><span id="tempo-value">120</span> BPM</div>
      </div>
      <div class="bottom-bar-controls">
        <button class="tb-btn" id="btn-prev" title="Previous cue">
          <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="tb-btn tb-btn--play" id="btn-play" title="Play/Stop">
          <svg class="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <svg class="icon-stop hidden" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12"/></svg>
        </button>
        <button class="tb-btn" id="btn-next" title="Next cue">
          <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2.5-6 5.5 3.9V8.1z"/><path d="M16 6h2v12h-2z"/></svg>
        </button>
        <button class="tb-btn tb-btn--loop" id="btn-loop" title="Loop current section">
          <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
        </button>
        <button class="tb-btn tb-btn--reload" id="btn-reload" title="Reload setlist">
          <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        </button>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
